<div class="service-specific-fields">
  <div class="form-group">
    <label>Number of Pages <span class="req">*</span></label>
    <input type="number" id="print-pages" min="1" placeholder="ex. 5">
  </div>
  <div class="form-group">
    <label>Print Type <span class="req">*</span></label>
    <select id="print-type">
      <option>Black & White</option>
      <option>Colored</option>
    </select>
  </div>
</div>
